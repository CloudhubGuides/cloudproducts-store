<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CloudProducts Store</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e3a8a);
      color: white;
    }

    header {
      padding: 20px;
      text-align: center;
      background: #1e40af;
      font-size: 26px;
      font-weight: bold;
    }

    .container {
      padding: 20px;
      max-width: 1200px;
      margin: auto;
    }

    .category {
      margin-bottom: 50px;
    }

    .category h2 {
      border-left: 5px solid #60a5fa;
      padding-left: 10px;
    }

    .items {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }

    .card {
      background: #1e3a8a;
      border-radius: 15px;
      padding: 15px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px) scale(1.03);
    }

    .card img {
      width: 100%;
      border-radius: 10px;
      height: 150px;
      object-fit: cover;
    }

    .card h3 {
      margin: 10px 0 5px;
    }

    .price {
      color: #93c5fd;
      margin-bottom: 10px;
      font-weight: bold;
    }

    .buy-btn {
      background: #3b82f6;
      border: none;
      padding: 10px;
      width: 100%;
      border-radius: 8px;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    .buy-btn:hover {
      background: #2563eb;
    }

    .payment-note {
      margin-top: 40px;
      padding: 20px;
      background: #1e40af;
      border-radius: 10px;
      text-align: center;
      font-size: 16px;
    }

    .discord-btn {
      display: inline-block;
      margin-top: 15px;
      padding: 10px 20px;
      background: #5865F2;
      border-radius: 8px;
      color: white;
      text-decoration: none;
      font-weight: bold;
    }

  </style>
</head>
<body>

<header>
  CloudProducts Store
</header>

<div class="container">

  <!-- Decorations -->
  <div class="category">
    <h2>Decorations</h2>

    <div class="items">

      <div class="card">
        <img src="https://via.placeholder.com/200">
        <h3>Random Decorations / Profile Effects</h3>
        <div class="price">€0.79</div>
        <button class="buy-btn" onclick="buyItem('https://cloudproducts.mysellauth.com/product/DECORATIONS')">Buy</button>
      </div>

      <div class="card">
        <img src="https://via.placeholder.com/200">
        <h3>Random Nameplates</h3>
        <div class="price">€0.85</div>
        <button class="buy-btn" onclick="buyItem('https://cloudproducts.mysellauth.com/product/NAMEPLATES')">Buy</button>
      </div>

    </div>
  </div>

  <!-- Cloud Plans -->
  <div class="category">
    <h2>Cloud Plans</h2>

    <div class="items">

      <div class="card">
        <img src="https://via.placeholder.com/200">
        <h3>Cloud+ (Monthly)</h3>
        <div class="price">€4.90</div>
        <button class="buy-btn" onclick="buyItem('https://cloudproducts.mysellauth.com/product/CLOUDPLUS')">Buy</button>
      </div>

      <div class="card">
        <img src="https://via.placeholder.com/200">
        <h3>Cloud Pro (Monthly)</h3>
        <div class="price">€9.92</div>
        <button class="buy-btn" onclick="buyItem('https://cloudproducts.mysellauth.com/product/CLOUDPRO')">Buy</button>
      </div>

    </div>
  </div>

  <!-- Payment Note -->
  <div class="payment-note">
    ⚠️ If you want to pay using Card, PayPal, Apple Pay, or Venmo, please open a ticket in Discord before purchasing.
    <br>
    <a class="discord-btn" href="#">Join Discord</a>
  </div>

</div>

<script>
function buyItem(link) {
  alert("You are being redirected to checkout.\n\nIf you want to use Card, PayPal, Apple Pay, or Venmo, open a Discord ticket first.");
  window.location.href = link;
}
</script>

</body>
</html>
